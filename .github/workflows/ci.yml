name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -v
      - name: Demo scan (expected exit 1 — CRITICAL findings in fixture)
        run: |
          quantumshield scan examples/vulnerable-demo -o /tmp/demo-out || test $? -eq 1
          test -f /tmp/demo-out/cbom.cdx.json
      - name: Upload demo CBOM + report
        uses: actions/upload-artifact@v4
        with:
          name: demo-scan-py${{ matrix.python-version }}
          path: /tmp/demo-out/
